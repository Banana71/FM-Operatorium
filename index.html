<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FM-Operatorium - DX-Tools</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <script src="https://w.soundcloud.com/player/api.js"></script>
    <style>
        :root {
            --p-color: #33ff33;
            --bg-color: #050a05;
            --window-bg: #000000;
            --font-stack: 'VT323', monospace;
        }

        body {
            margin: 0;
            padding: 0;
	    height: 100vh; 
	    width: 100vw;
            background-color: black;
            color: var(--p-color);
            font-family: var(--font-stack);
            overflow: hidden; 

            background-image:
                /* Grid */
                linear-gradient(rgba(255, 0, 255, 0.2) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 0, 255, 0.2) 1px, transparent 1px),
                /* Horizon Glow */
                radial-gradient(circle at 50% 100%, rgba(255, 0, 255, 0.4), transparent 60%),
                /* Sun */
                radial-gradient(circle at 50% 80%, rgba(255, 100, 0, 0.6), transparent 40%);
            
            background-size:
                40px 40px,
                40px 40px,
                100% 100%,
                100% 100%;

            animation: gridMove 10s linear infinite;
        }

        @keyframes gridMove {
            from {
                background-position: 0 0, 0 0, center, center;
            }
            to {
                background-position: 0 40px, 40px 0, center, center;
            }
        }

        #taskbar {
            height: 30px;
            background-color: var(--p-color);
            color: var(--window-bg);
            display: flex;
            align-items: center;
            padding: 0 15px;
            font-size: 22px;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 2px 10px rgba(51, 255, 51, 0.4);
            z-index: 10000;
            position: relative;
        }

        #clock {
            margin-left: auto;
        }

        .desktop-dock {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 20px;
            position: absolute;
            top: 30px;
            z-index: 10;
        }

        .desktop-dock.left {
            left: 0;
        }

        .desktop-dock.right {
            right: 0;
        }

        .icon {
            width: 120px;
            text-align: center;
            cursor: pointer;
            padding: 10px;
            border: 1px solid transparent;
            transition: all 0.2s;
        }

        .icon:hover {
            background-color: rgba(51, 255, 51, 0.2);
            border: 1px dashed var(--p-color);
        }

        .icon-art {
            font-size: 40px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px var(--p-color);
        }

        .icon-label {
            font-size: 18px;
            text-transform: uppercase;
            color: #33ff33;
            text-shadow:
                0 0 2px #33ff33,
                0 0 5px #33ff33,
                0 0 10px #33ff33,
                0 0 20px #00ff99;
            background-color: rgba(0,0,0,0.6);
            padding: 2px 4px;
            display: inline-block;
        }

        .window {
            position: absolute;
            width: 850px;
            height: 700px;
            background-color: var(--window-bg);
            border: 2px solid var(--p-color);
            box-shadow: 5px 5px 0px rgba(51, 255, 51, 0.2), 0 0 15px rgba(51, 255, 51, 0.5);
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .window-header {
            background-color: var(--p-color);
            color: var(--window-bg);
            padding: 5px 10px;
            font-size: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: move;
            user-select: none;
        }

        .close-btn {
            background: var(--window-bg);
            color: var(--p-color);
            border: 1px solid var(--window-bg);
            cursor: pointer;
            font-family: var(--font-stack);
            font-size: 18px;
            padding: 0 8px;
            line-height: 1;
        }

        .close-btn:hover {
            background: #ff3333;
            color: #000;
        }

        .window-content {
            flex-grow: 1;
            background-color: var(--bg-color);
            position: relative;
            display: flex;
            flex-direction: column;
        }

        iframe {
            width: 100%;
            flex-grow: 1;
            border: none;
            display: block;
        }
        
        .iframe-shield {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 10;
            display: none;
        }
        .window.interacting .iframe-shield {
            display: block;
        }

        .resize-handle {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 15px;
            height: 15px;
            cursor: se-resize;
            background: linear-gradient(135deg, transparent 50%, var(--p-color) 50%);
            z-index: 20;
        }

        .vol-bar {
            background: #0a1a0a;
            border-bottom: 1px solid #225522;
            padding: 5px 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            height: 8px;
            background: #000;
            border: 1px solid var(--p-color);
            outline: none;
            width: 100%;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: var(--p-color);
            cursor: pointer;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="black"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14h-1v-2h1v2zm0-4h-1V7h1v5z"/></svg>');
            background-size: 80%;
            background-position: center;
            background-repeat: no-repeat;
            border-radius: 50%; 
        }

    </style>
</head>
<body>

    <div id="taskbar">
        <span>SOUNDPLANTAGE - FM-OPERATORIUM DX-Tools</span>
        <span id="clock">00:00:00</span>
    </div>

    <div class="desktop-dock left">
        <div class="icon" onclick="openWindow('dx7-sheet', 'DX7 DATA SHEET', 'operatorium.html')">
            <div class="icon-art">📄</div>
            <div class="icon-label">DX7 SHEET</div>
        </div>
        
        <div class="icon" onclick="openWindow('perflist', 'PERFLIST DOKU', 'https://cdn.jsdelivr.net/gh/Banana71/Soundplantage@main/Performance%20List.pdf', '880px', '740px')">
            <div class="icon-art">📋</div>
            <div class="icon-label">PERFLIST</div>
        </div>

        <div class="icon" onclick="openWindow('radio', 'SYNTHWAVE RADIO', 'https://synthwaveradio.eu', '500px', '680px')">
            <div class="icon-art">📻</div>
            <div class="icon-label">RADIO</div>
        </div>

        <div class="icon" onclick="openWindow('soundcloud', 'MINIDEXED-DEMO', 'https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/soundplantage/sets/minidexed2&color=%2333ff33&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&visual=false', '440px', '700px')">
            <div class="icon-art">🎹</div>
            <div class="icon-label">MINIDEXED-DEMO</div>
        </div>


    </div>

    <div class="desktop-dock right">
        <div class="icon" onclick="window.open('https://github.com/probonopd/MiniDexed', '_blank')">
            <div class="icon-art">🌎</div>
            <div class="icon-label">MINIDEXED</div>
        </div>

        <div class="icon" onclick="window.open('https://github.com/DreamDexed/DreamDexed', '_blank')">
            <div class="icon-art">🌍</div>
            <div class="icon-label">DREAMDEXED</div>
        </div>
        <div class="icon" onclick="openWindow('arpeggiator', 'ARPEGGIATOR', 'arp.html', '420px', '700px')">
            <div class="icon-art">🔔</div>
            <div class="icon-label">ARPEGGIATOR</div>
        </div>

        <div class="icon" onclick="openWindow('pacman', 'PAC-MAN.EXE', 'https://freepacman.org', '700px', '720px')">
            <div class="icon-art">🍒</div>
            <div class="icon-label">PAC-MAN</div>
        </div>
    </div>

    <script>
        let zIndexCounter = 100;

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('de-DE');
        }
        setInterval(updateClock, 1000);
        updateClock();

        function openWindow(id, title, url, width = '850px', height = '700px') {
            if (document.getElementById(id)) {
                bringToFront(document.getElementById(id));
                return;
            }

            const win = document.createElement('div');
            win.className = 'window';
            win.id = id;
            
            const offset = (zIndexCounter % 10) * 30;
            win.style.top = (60 + offset) + 'px';
            win.style.left = (180 + offset) + 'px';
            win.style.zIndex = ++zIndexCounter;
            
            win.style.width = width;
            win.style.height = height;

            let innerContent = '';
            if (id === 'soundcloud') {
                innerContent = `
                    <div class="vol-bar">
                        <span>VOL:</span>
                        <input type="range" id="sc-vol" min="0" max="100" value="100">
                    </div>
                    <div class="iframe-shield"></div>
                    <iframe id="iframe-${id}" src="${url}" allow="autoplay"></iframe>
                `;
            } else {
                innerContent = `
                    <div class="iframe-shield"></div>
                    <iframe id="iframe-${id}" src="${url}" allow="autoplay"></iframe>
                `;
            }

            win.innerHTML = `
                <div class="window-header" onmousedown="startDrag(event, '${id}')">
                    <span>> ${title}</span>
                    <button class="close-btn" onclick="closeWindow('${id}')">[X]</button>
                </div>
                <div class="window-content">
                    ${innerContent}
                </div>
                <div class="resize-handle" onmousedown="startResize(event, '${id}')"></div>
            `;

            win.onmousedown = () => bringToFront(win);
            document.body.appendChild(win);

            if (id === 'soundcloud') {
                const iframeElement = document.getElementById(`iframe-${id}`);
                const widget = SC.Widget(iframeElement);
                const volSlider = document.getElementById('sc-vol');
                
                volSlider.addEventListener('input', (e) => {
                    widget.setVolume(e.target.value);
                });
            }
        }

        function closeWindow(id) {
            const win = document.getElementById(id);
            if (win) win.remove();
        }

        function bringToFront(win) {
            win.style.zIndex = ++zIndexCounter;
        }

        // --- DRAG LOGIK ---
        let isDragging = false;
        let currentWindow = null;
        let startX, startY, initialLeft, initialTop;

        function startDrag(e, id) {
            if (e.target.classList.contains('close-btn')) return;
            
            isDragging = true;
            currentWindow = document.getElementById(id);
            currentWindow.classList.add('interacting'); 
            bringToFront(currentWindow);

            startX = e.clientX;
            startY = e.clientY;
            initialLeft = currentWindow.offsetLeft;
            initialTop = currentWindow.offsetTop;

            document.addEventListener('mousemove', drag);
            document.addEventListener('mouseup', stopDrag);
        }

        function drag(e) {
            if (!isDragging || !currentWindow) return;
            e.preventDefault();
            
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            
            let newTop = initialTop + dy;
            if (newTop < 30) newTop = 30;

            currentWindow.style.left = (initialLeft + dx) + 'px';
            currentWindow.style.top = newTop + 'px';
        }

        function stopDrag() {
            if (!isDragging) return;
            isDragging = false;
            if (currentWindow) currentWindow.classList.remove('interacting');
            currentWindow = null;
            document.removeEventListener('mousemove', drag);
            document.removeEventListener('mouseup', stopDrag);
        }

        // --- RESIZE LOGIK ---
        let isResizing = false;
        let startW, startH;

        function startResize(e, id) {
            e.stopPropagation(); 
            isResizing = true;
            currentWindow = document.getElementById(id);
            currentWindow.classList.add('interacting'); 
            bringToFront(currentWindow);

            startX = e.clientX;
            startY = e.clientY;
            startW = currentWindow.offsetWidth;
            startH = currentWindow.offsetHeight;

            document.addEventListener('mousemove', resizeWindow);
            document.addEventListener('mouseup', stopResize);
        }

        function resizeWindow(e) {
            if (!isResizing || !currentWindow) return;
            e.preventDefault();
            
            const newWidth = startW + (e.clientX - startX);
            const newHeight = startH + (e.clientY - startY);
            
            if (newWidth > 250) currentWindow.style.width = newWidth + 'px';
            if (newHeight > 150) currentWindow.style.height = newHeight + 'px';
        }

        function stopResize() {
            if (!isResizing) return;
            isResizing = false;
            if (currentWindow) currentWindow.classList.remove('interacting');
            currentWindow = null;
            document.removeEventListener('mousemove', resizeWindow);
            document.removeEventListener('mouseup', stopResize);
        }
    </script>
</body>
</html>
