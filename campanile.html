<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FM-Operatorium - Campanile</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --p-color: #33ff33;
            --bg-color: #000000;
            --font-stack: 'VT323', monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--p-color);
            font-family: var(--font-stack);
            font-size: 18px;
            margin: 0;
            padding: 10px;
            text-shadow: 0 0 5px var(--p-color);
            overflow: hidden;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            border: 2px solid var(--p-color);
            padding: 10px;
            box-shadow: 0 0 10px rgba(51, 255, 51, 0.3);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        h1 {
            text-transform: uppercase;
            font-size: 20px;
            border-bottom: 1px dashed var(--p-color);
            padding-bottom: 5px;
            margin: 0;
            display: flex;
            align-items: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        label {
            text-transform: uppercase;
            font-size: 16px;
        }

        select, input[type="range"] {
            width: 100%;
            background-color: #0a1a0a;
            color: var(--p-color);
            border: 1px solid var(--p-color);
            font-family: var(--font-stack);
            font-size: 18px;
            padding: 5px;
            box-sizing: border-box;
        }

        input[type="range"] {
            -webkit-appearance: none;
            height: 10px;
            outline: none;
            padding: 0;
            margin-top: 5px;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 15px;
            height: 20px;
            background: var(--p-color);
            cursor: pointer;
        }

        .btn-test {
            width: 100%;
            background-color: #0a1a0a;
            color: var(--p-color);
            border: 1px solid var(--p-color);
            font-family: var(--font-stack);
            font-size: 20px;
            padding: 8px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.2s;
        }

        .btn-test:active {
            background-color: var(--p-color);
            color: #000;
            box-shadow: 0 0 10px var(--p-color);
        }

        .led-display {
            background-color: #200000;
            color: #ff3333;
            border: 2px inset #500000;
            border-radius: 4px;
            padding: 2px 6px;
            font-family: var(--font-stack);
            font-size: 22px;
            font-weight: bold;
            text-shadow: 0 0 8px #ff0000;
            box-shadow: inset 0 0 5px #000;
            display: inline-block;
            min-width: 3ch;
            text-align: right;
            letter-spacing: 2px;
        }

        .bpm-display {
            font-size: 16px;
            margin-top: 2px;
        }

        #status-led {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #113311;
            margin-right: 8px;
        }

        #status-led.active {
            background-color: #33ff33;
            box-shadow: 0 0 10px #33ff33;
        }

        pre {
            background-color: #051005;
            border: 1px solid #225522;
            padding: 8px;
            height: 60px;
            overflow-y: auto;
            white-space: pre-wrap;
            margin: 0;
            font-size: 14px;
        }

        .patch-hint {
            font-size: 14px;
            color: #33ff33;
            text-shadow: 0 0 3px #33ff33;
            margin-top: -5px;
            padding-left: 5px;
            border-left: 2px solid #33ff33;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><span id="status-led"></span>CAMPANILE.SYS</h1>

        <div class="control-group">
            <label>> MIDI IN (KEYBOARD)</label>
            <select id="midiInSelect"><option value="">SEARCHING...</option></select>
        </div>

        <div class="control-group">
            <label>> MIDI OUT (MINIDEXED)</label>
            <select id="midiOutSelect"><option value="">SEARCHING...</option></select>
        </div>

        <div class="control-group">
            <label>> GROSS (C) BPM: <span id="valBpmGross" class="led-display">115</span></label>
            <input type="range" id="sliderBpmGross" min="60" max="200" value="115">
            <div class="bpm-display" id="bpmDisplayAll">MITTEL: 130 | KLEIN: 142</div>
        </div>

        <div class="control-group">
            <label>> MITTEL OFFSET: <span id="valOffsetMittel" class="led-display">+15</span> BPM</label>
            <input type="range" id="sliderOffsetMittel" min="0" max="30" value="15">
        </div>

        <div class="control-group">
            <label>> KLEIN OFFSET: <span id="valOffsetKlein" class="led-display">+27</span> BPM</label>
            <input type="range" id="sliderOffsetKlein" min="0" max="40" value="27">
        </div>

        <div class="control-group">
            <label>> NOTE LENGTH</label>
            <select id="noteLength">
                <option value="4" selected>1/1 (Whole)</option>
                <option value="2">1/2 (Half)</option>
                <option value="1">1/4 (Quarter)</option>
            </select>
        </div>

        <div class="control-group">
            <label>> RÜCKSCHLAG-VELOCITY: <span id="valDamp" class="led-display">-23</span></label>
            <input type="range" id="sliderDamp" min="0" max="100" value="23">
        </div>

        <div class="control-group">
            <label>> ASYMMETRIE: <span id="valAsym" class="led-display">0.48</span></label>
            <input type="range" id="sliderAsym" min="0.20" max="0.80" step="0.01" value="0.48">
        </div>

        <div class="control-group">
            <label>> HUMANIZE (±ms): <span id="valHumanize" class="led-display">9</span></label>
            <input type="range" id="sliderHumanize" min="0" max="50" value="9">
        </div>

        <button id="btnTest" class="btn-test">TEST C3 (VEL 100)</button>

        <pre id="terminal">System ready.</pre>
        <div class="patch-hint">> Recommendation: MiniDexed Perf 002:057 GOTHIC TOWER</div>
    </div>

    <script>
        const NOTE_INTERVALS = [0, 2, 4]; // C, D, E relativ zum Grundton
        let midiAccess = null;
        let selectedInput = null;
        let selectedOutput = null;
        let activeNote = null;
        let activeVelocity = 100;
        let masterBpm = 115;
        let offsetMittel = 15;
        let offsetKlein = 27;
        let noteLengthMultiplier = 4;
        let dampAmount = 23;
        let asymFactor = 0.48;
        let humanizeMax = 9;
        let running = false;

        let timers = [[], [], []];

        function getBpmForBell(index) {
            if (index === 0) return masterBpm;
            if (index === 1) return masterBpm + offsetMittel;
            if (index === 2) return masterBpm + offsetKlein;
        }

        function getPeriodMs(bellIndex) {
            const bpm = getBpmForBell(bellIndex);
            return (60000 / bpm) * noteLengthMultiplier;
        }

        function logMsg(msg) {
            const t = document.getElementById('terminal');
            t.textContent = msg + '\n' + t.textContent.split('\n').slice(0, 3).join('\n');
        }

        if (navigator.requestMIDIAccess) {
            navigator.requestMIDIAccess().then(onMIDISuccess, () => logMsg('?ERROR: MIDI ACCESS DENIED.'));
        } else {
            logMsg('?ERROR: WebMIDI not supported.');
        }

        function onMIDISuccess(access) {
            midiAccess = access;
            updatePorts();
            midiAccess.onstatechange = updatePorts;
        }

        function updatePorts() {
            const inSel = document.getElementById('midiInSelect');
            const outSel = document.getElementById('midiOutSelect');
            inSel.innerHTML = '<option value="">-- SELECT --</option>';
            for (let input of midiAccess.inputs.values()) {
                inSel.innerHTML += `<option value="${input.id}">${input.name}</option>`;
            }
            outSel.innerHTML = '<option value="">-- SELECT --</option>';
            for (let output of midiAccess.outputs.values()) {
                outSel.innerHTML += `<option value="${output.id}">${output.name}</option>`;
            }
        }

        document.getElementById('midiInSelect').addEventListener('change', e => {
            if (selectedInput) selectedInput.onmidimessage = null;
            if (e.target.value) {
                selectedInput = midiAccess.inputs.get(e.target.value);
                selectedInput.onmidimessage = handleMIDIMessage;
                logMsg(`> IN: ${selectedInput.name}`);
            }
        });

        document.getElementById('midiOutSelect').addEventListener('change', e => {
            if (e.target.value) {
                selectedOutput = midiAccess.outputs.get(e.target.value);
                logMsg(`> OUT: ${selectedOutput.name}`);
            } else {
                selectedOutput = null;
            }
        });

        function handleMIDIMessage(msg) {
            const [status, note, velocity] = msg.data;
            const cmd = status >> 4;
            if (cmd === 9 && velocity > 0) {
                startPeal(note, velocity);
            } else if (cmd === 8 || (cmd === 9 && velocity === 0)) {
                stopPeal();
            }
        }

        const btnTest = document.getElementById('btnTest');
        btnTest.addEventListener('mousedown', () => startPeal(60, 100));
        btnTest.addEventListener('mouseup', () => stopPeal());
        btnTest.addEventListener('touchstart', e => {
            e.preventDefault();
            startPeal(60, 100);
        });
        btnTest.addEventListener('touchend', e => {
            e.preventDefault();
            stopPeal();
        });

        function humanizedDelay(baseMs) {
            const offset = (Math.random() * 2 - 1) * humanizeMax;
            return Math.max(0, baseMs + offset);
        }

        function startPeal(note, velocity) {
            stopPeal();
            running = true;
            activeNote = note;
            activeVelocity = velocity;
            document.getElementById('status-led').classList.add('active');

            dampAmount = parseInt(document.getElementById('sliderDamp').value);
            asymFactor = parseFloat(document.getElementById('sliderAsym').value);
            noteLengthMultiplier = parseFloat(document.getElementById('noteLength').value);
            masterBpm = parseInt(document.getElementById('sliderBpmGross').value);
            offsetMittel = parseInt(document.getElementById('sliderOffsetMittel').value);
            offsetKlein = parseInt(document.getElementById('sliderOffsetKlein').value);
            humanizeMax = parseInt(document.getElementById('sliderHumanize').value);
            updateBpmDisplay();
            document.getElementById('valHumanize').textContent = humanizeMax;

            const now = performance.now();

            // Kleine Glocke (Index 2) startet sofort
            const bellSmall = activeNote + NOTE_INTERVALS[2];
            const periodSmall = getPeriodMs(2);
            sendNoteOn(bellSmall, activeVelocity);
            scheduleReturn(now, 2, bellSmall, periodSmall);

            // Mittlere Glocke (Index 1) mit zufälligem Start-Delay 0.2–1.0 s
            const startDelayMittel = 200 + Math.random() * 800;
            const bellMittel = activeNote + NOTE_INTERVALS[1];
            const periodMittel = getPeriodMs(1);
            const timerMittel = setTimeout(() => {
                if (!running || activeNote === null) return;
                const tNow = performance.now();
                sendNoteOn(bellMittel, activeVelocity);
                scheduleReturn(tNow, 1, bellMittel, periodMittel);
            }, startDelayMittel);
            timers[1].push(timerMittel);

            // Große Glocke (Index 0) mit zufälligem Start-Delay 0.2–1.0 s
            const startDelayGross = 200 + Math.random() * 800;
            const bellGross = activeNote + NOTE_INTERVALS[0];
            const periodGross = getPeriodMs(0);
            const timerGross = setTimeout(() => {
                if (!running || activeNote === null) return;
                const tNow = performance.now();
                sendNoteOn(bellGross, activeVelocity);
                scheduleReturn(tNow, 0, bellGross, periodGross);
            }, startDelayGross);
            timers[0].push(timerGross);
        }

        function sendRetrigger(note, vel) {
            if (!selectedOutput) return;
            selectedOutput.send([0x80, note, 0]);
            selectedOutput.send([0x90, note, vel]);
        }

        function scheduleReturn(startTime, bellIdx, note, periodMs) {
            const baseDelay = periodMs * asymFactor;
            const delay = humanizedDelay(baseDelay);
            const id = setTimeout(() => {
                if (!running || activeNote === null) return;
                const returnVel = Math.max(1, activeVelocity - dampAmount);
                sendRetrigger(note, returnVel);
                scheduleNextMain(performance.now(), bellIdx, note, periodMs);
            }, delay);
            timers[bellIdx].push(id);
        }

        function scheduleNextMain(startTime, bellIdx, note, periodMs) {
            const baseDelay = periodMs * (1 - asymFactor);
            const delay = humanizedDelay(baseDelay);
            const id = setTimeout(() => {
                if (!running || activeNote === null) return;
                sendRetrigger(note, activeVelocity);
                scheduleReturn(performance.now(), bellIdx, note, periodMs);
            }, delay);
            timers[bellIdx].push(id);
        }

        function stopPeal() {
            if (!running) return;
            running = false;
            document.getElementById('status-led').classList.remove('active');
            for (let b = 0; b < 3; b++) {
                timers[b].forEach(id => clearTimeout(id));
                timers[b] = [];
            }
            if (activeNote !== null) {
                for (let i = 0; i < 3; i++) {
                    sendNoteOff(activeNote + NOTE_INTERVALS[i]);
                }
                activeNote = null;
            }
        }

        function sendNoteOn(note, vel) {
            if (!selectedOutput) return;
            selectedOutput.send([0x90, note, vel]);
        }

        function sendNoteOff(note) {
            if (!selectedOutput) return;
            selectedOutput.send([0x80, note, 0]);
        }

        function updateBpmDisplay() {
            document.getElementById('valBpmGross').textContent = String(masterBpm).padStart(3, '0');
            document.getElementById('valOffsetMittel').textContent = '+' + offsetMittel;
            document.getElementById('valOffsetKlein').textContent = '+' + offsetKlein;
            const mittelBpm = masterBpm + offsetMittel;
            const kleinBpm = masterBpm + offsetKlein;
            document.getElementById('bpmDisplayAll').textContent = 
                `MITTEL: ${mittelBpm} | KLEIN: ${kleinBpm}`;
        }

        // UI-Events
        document.getElementById('sliderBpmGross').addEventListener('input', e => {
            masterBpm = parseInt(e.target.value);
            updateBpmDisplay();
            if (running && activeNote !== null) restartPeal();
        });

        document.getElementById('sliderOffsetMittel').addEventListener('input', e => {
            offsetMittel = parseInt(e.target.value);
            updateBpmDisplay();
            if (running && activeNote !== null) restartPeal();
        });

        document.getElementById('sliderOffsetKlein').addEventListener('input', e => {
            offsetKlein = parseInt(e.target.value);
            updateBpmDisplay();
            if (running && activeNote !== null) restartPeal();
        });

        document.getElementById('noteLength').addEventListener('change', e => {
            noteLengthMultiplier = parseFloat(e.target.value);
            if (running && activeNote !== null) restartPeal();
        });

        document.getElementById('sliderDamp').addEventListener('input', e => {
            dampAmount = parseInt(e.target.value);
            document.getElementById('valDamp').textContent = '-' + dampAmount;
        });

        document.getElementById('sliderAsym').addEventListener('input', e => {
            asymFactor = parseFloat(e.target.value);
            document.getElementById('valAsym').textContent = asymFactor.toFixed(2);
            if (running && activeNote !== null) restartPeal();
        });

        document.getElementById('sliderHumanize').addEventListener('input', e => {
            humanizeMax = parseInt(e.target.value);
            document.getElementById('valHumanize').textContent = humanizeMax;
        });

        function restartPeal() {
            const n = activeNote;
            const v = activeVelocity;
            stopPeal();
            startPeal(n, v);
        }

        // Initiale Anzeige
        updateBpmDisplay();
        document.getElementById('valDamp').textContent = '-' + dampAmount;
        document.getElementById('valAsym').textContent = asymFactor.toFixed(2);
        document.getElementById('valHumanize').textContent = humanizeMax;
    </script>
</body>
</html>
