<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FM-Operatorium - Chord Scanner</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --p-color: #33ff33;
            --bg-color: #000000;
            --font-stack: 'VT323', monospace;
        }

        body {
            background-color: var(--bg-color);
            color: var(--p-color);
            font-family: var(--font-stack);
            font-size: 18px;
            margin: 0;
            padding: 10px;
            text-shadow: 0 0 5px var(--p-color);
            overflow: hidden;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            border: 2px solid var(--p-color);
            padding: 10px;
            box-shadow: 0 0 10px rgba(51, 255, 51, 0.3);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        h1 {
            text-transform: uppercase;
            font-size: 20px;
            border-bottom: 1px dashed var(--p-color);
            padding-bottom: 5px;
            margin: 0;
            display: flex;
            align-items: center;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        label {
            text-transform: uppercase;
            font-size: 16px;
        }

        select, input[type="checkbox"] {
            width: 100%;
            background-color: #0a1a0a;
            color: var(--p-color);
            border: 1px solid var(--p-color);
            font-family: var(--font-stack);
            font-size: 18px;
            padding: 5px;
            box-sizing: border-box;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-row input[type="checkbox"] {
            width: auto;
            height: 18px;
            margin: 0;
        }

        .chord-display {
            background-color: #200000;
            color: #ff3333;
            border: 2px inset #500000;
            border-radius: 4px;
            padding: 8px;
            text-align: center;
            font-size: 34px;
            font-weight: bold;
            text-shadow: 0 0 15px #ff0000;
            box-shadow: inset 0 0 10px #000;
            letter-spacing: 3px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 1;
        }

        @keyframes fadeOut {
            from { opacity: 1; }
            to   { opacity: 0; }
        }

        .chord-display.fade-out {
            animation: fadeOut 1s forwards;
        }

        .alt-display {
            background-color: #051005;
            border: 1px solid #225522;
            padding: 4px 8px;
            font-size: 14px;
            text-align: center;
            min-height: 20px;
            color: #33ff33;
            text-shadow: 0 0 3px #33ff33;
            opacity: 0.8;
            letter-spacing: 1px;
        }

        .notes-display {
            background-color: #051005;
            border: 1px solid #225522;
            padding: 8px;
            font-size: 20px;
            text-align: center;
            min-height: 30px;
        }

        #status-led {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #113311;
            margin-right: 8px;
        }

        #status-led.active {
            background-color: #33ff33;
            box-shadow: 0 0 10px #33ff33;
        }

        pre {
            background-color: #051005;
            border: 1px solid #225522;
            padding: 8px;
            height: 50px;
            overflow-y: auto;
            white-space: pre-wrap;
            margin: 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><span id="status-led"></span>CHORD SCANNER</h1>

        <div class="control-group">
            <label>> MIDI IN (KEYBOARD)</label>
            <select id="midiInSelect"><option value="">SEARCHING...</option></select>
        </div>

        <div class="control-group">
            <div class="checkbox-row">
                <input type="checkbox" id="preferFlats" checked>
                <label for="preferFlats">PREFER FLATS (♭)</label>
            </div>
        </div>

        <div class="chord-display" id="chordName"></div>
        <div class="alt-display" id="altChords"></div>

        <div class="notes-display" id="notesList">no notes</div>

        <pre id="terminal">System ready.</pre>
    </div>

    <script>
        let midiAccess = null;
        let selectedInput = null;
        let activeNotes = new Map();

        const chordDisplay = document.getElementById('chordName');
        const altDisplay = document.getElementById('altChords');
        const notesDisplay = document.getElementById('notesList');
        const terminal = document.getElementById('terminal');
        const statusLed = document.getElementById('status-led');
        const preferFlatsCheckbox = document.getElementById('preferFlats');

        let debounceTimer = null;

        const PITCH_CLASSES = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];

        // Enharmonisches Mapping # → ♭
        const FLAT_MAP = {
            'C#': 'D♭',
            'D#': 'E♭',
            'F#': 'G♭',
            'G#': 'A♭',
            'A#': 'B♭',
            // Auch die mit ASCII b oder Symbol
            'C♯': 'D♭',
            'D♯': 'E♭',
            'F♯': 'G♭',
            'G♯': 'A♭',
            'A♯': 'B♭',
            'Db': 'D♭',
            'Eb': 'E♭',
            'Gb': 'G♭',
            'Ab': 'A♭',
            'Bb': 'B♭'
        };

        const CHORD_PATTERNS = [
            { name: '', intervals: [0, 4, 7] },
            { name: 'm', intervals: [0, 3, 7] },
            { name: 'sus2', intervals: [0, 2, 7] },
            { name: 'sus4', intervals: [0, 5, 7] },
            { name: 'dim', intervals: [0, 3, 6] },
            { name: 'aug', intervals: [0, 4, 8] },
            { name: '6', intervals: [0, 4, 7, 9] },
            { name: 'm6', intervals: [0, 3, 7, 9] },
            { name: 'maj7', intervals: [0, 4, 7, 11] },
            { name: '7', intervals: [0, 4, 7, 10] },
            { name: 'm7', intervals: [0, 3, 7, 10] },
            { name: 'm(maj7)', intervals: [0, 3, 7, 11] },
            { name: 'm7♭5', intervals: [0, 3, 6, 10] },
            { name: 'dim7', intervals: [0, 3, 6, 9] },
            { name: '7sus4', intervals: [0, 5, 7, 10] },
            { name: '7sus2', intervals: [0, 2, 7, 10] },
            { name: 'add9', intervals: [0, 2, 4, 7] },
            { name: 'madd9', intervals: [0, 2, 3, 7] },
            { name: 'maj7♭5', intervals: [0, 4, 6, 11] },
            { name: '7♭5', intervals: [0, 4, 6, 10] },
            { name: '7♯5', intervals: [0, 4, 8, 10] },
            { name: 'maj7♯11', intervals: [0, 4, 6, 7, 11] },
            { name: '9', intervals: [0, 2, 4, 7, 10] },
            { name: 'maj9', intervals: [0, 2, 4, 7, 11] },
            { name: 'm9', intervals: [0, 2, 3, 7, 10] },
            { name: '7♭9', intervals: [0, 1, 4, 7, 10] },
            { name: '7♯9', intervals: [0, 3, 4, 7, 10] },
            { name: '6/9', intervals: [0, 2, 4, 7, 9] },
            { name: 'm6/9', intervals: [0, 2, 3, 7, 9] },
            { name: '9sus4', intervals: [0, 2, 5, 7, 10] }
        ];

        function logMsg(msg) {
            terminal.textContent = msg + '\n' + terminal.textContent.split('\n').slice(0, 3).join('\n');
        }

        function midiToPitchClass(number) {
            return PITCH_CLASSES[number % 12];
        }

        function pitchClassToNumber(pc) {
            // Normalisiert auf C, C#... – entfernt ♭-Varianten
            const normalized = pc
                .replace('♯', '#')
                .replace('♭', 'b')
                .replace('Db', 'C#')
                .replace('Eb', 'D#')
                .replace('Gb', 'F#')
                .replace('Ab', 'G#')
                .replace('Bb', 'A#');
            return PITCH_CLASSES.indexOf(normalized);
        }

        function midiToFullNote(number) {
            const pc = PITCH_CLASSES[number % 12];
            const octave = Math.floor(number / 12) - 1;
            return pc + octave;
        }

        // Wandelt eine einzelne Pitch-Klasse (z. B. 'C#') in Flat-Darstellung um, wenn Checkbox aktiv
        function toFlat(pc) {
            if (!preferFlatsCheckbox.checked) {
                return pc.replace('#', '♯').replace('b', '♭');
            }
            // Erst ASCII ersetzen
            let normal = pc.replace('#', '♯').replace('b', '♭');
            // Dann Flat-Map anwenden
            return FLAT_MAP[normal] || normal;
        }

        function beautifyChord(raw) {
            // Slash behandeln
            if (raw.includes('/')) {
                const [chordPart, bassPart] = raw.split('/');
                return beautifyChord(chordPart) + '/' + toFlat(bassPart);
            }

            // Grundton und Suffix extrahieren
            const match = raw.match(/^([A-G][#♯♭b]?)(.*)/);
            if (!match) return raw;

            let root = match[1];
            const suffix = match[2];

            // In Flat umwandeln wenn Checkbox aktiv
            if (preferFlatsCheckbox.checked) {
                root = root.replace('#', '♯').replace('b', '♭');
                root = FLAT_MAP[root] || root;
            } else {
                root = root.replace('#', '♯').replace('b', '♭');
            }

            // Suffix auch von ASCII befreien
            const cleanSuffix = suffix.replace('#', '♯').replace('b', '♭');
            return root + cleanSuffix;
        }

        function detectAllChords(midiNotes) {
            if (midiNotes.length < 3) return [];

            const seen = new Set();
            const uniquePCs = [];
            for (let i = 0; i < midiNotes.length; i++) {
                const pc = midiToPitchClass(midiNotes[i]);
                if (!seen.has(pc)) {
                    seen.add(pc);
                    uniquePCs.push(pc);
                }
            }

            const results = [];

            for (let rootPC of uniquePCs) {
                const intervals = [0];
                for (let pc of uniquePCs) {
                    if (pc === rootPC) continue;
                    let diff = pitchClassToNumber(pc) - pitchClassToNumber(rootPC);
                    if (diff < 0) diff += 12;
                    if (diff > 0) intervals.push(diff);
                }
                intervals.sort((a, b) => a - b);

                for (let pattern of CHORD_PATTERNS) {
                    if (pattern.intervals.length === intervals.length &&
                        pattern.intervals.every((v, i) => v === intervals[i])) {
                        results.push(rootPC + pattern.name);
                        break;
                    }
                }
            }

            return results;
        }

        function selectMainChord(allChords, midiNotes) {
            if (allChords.length === 0) return null;

            const bassPC = midiToPitchClass(midiNotes[0]);
            const first = allChords[0];
            const firstRoot = first.match(/^[A-G][#♯♭b]?/)[0];

            // Vergleiche Pitch-Class-Nummern
            if (pitchClassToNumber(firstRoot) !== pitchClassToNumber(bassPC)) {
                return first + '/' + bassPC;
            }
            return first;
        }

        function updateNotesDisplay() {
            if (activeNotes.size === 0) {
                statusLed.classList.remove('active');
                notesDisplay.textContent = 'no notes';
            } else {
                statusLed.classList.add('active');
                const midiNotes = Array.from(activeNotes.keys()).sort((a, b) => a - b);
                const fullNotes = midiNotes.map(n => midiToFullNote(n));
                notesDisplay.textContent = fullNotes.join('  ');
            }
        }

        function evaluateChord() {
            const midiNotes = Array.from(activeNotes.keys()).sort((a, b) => a - b);
            const all = detectAllChords(midiNotes);
            const mainRaw = selectMainChord(all, midiNotes);

            if (mainRaw) {
                chordDisplay.classList.remove('fade-out');
                chordDisplay.style.opacity = '1';
                chordDisplay.textContent = beautifyChord(mainRaw);

                const mainClean = beautifyChord(mainRaw);
                const others = all
                    .map(c => beautifyChord(c))
                    .filter(c => c !== mainClean && c !== mainRaw);
                const uniqueOthers = [...new Set(others)];
                altDisplay.textContent = uniqueOthers.length > 0 
                    ? uniqueOthers.join('  |  ') 
                    : '';
            } else {
                if (chordDisplay.textContent !== '') {
                    if (!chordDisplay.classList.contains('fade-out')) {
                        chordDisplay.classList.add('fade-out');
                        const onAnimationEnd = () => {
                            chordDisplay.textContent = '';
                            chordDisplay.classList.remove('fade-out');
                            chordDisplay.style.opacity = '1';
                            altDisplay.textContent = '';
                            chordDisplay.removeEventListener('animationend', onAnimationEnd);
                        };
                        chordDisplay.addEventListener('animationend', onAnimationEnd, { once: true });

                        setTimeout(() => {
                            if (chordDisplay.classList.contains('fade-out')) {
                                chordDisplay.textContent = '';
                                chordDisplay.classList.remove('fade-out');
                                chordDisplay.style.opacity = '1';
                                altDisplay.textContent = '';
                            }
                        }, 1500);
                    }
                }
            }
        }

        function scheduleEvaluation() {
            if (debounceTimer) clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => {
                evaluateChord();
                debounceTimer = null;
            }, 50);
        }

        function handleMidiChange() {
            updateNotesDisplay();
            scheduleEvaluation();
        }

        // WebMIDI
        if (navigator.requestMIDIAccess) {
            navigator.requestMIDIAccess().then(onMIDISuccess, () => logMsg('?ERROR: MIDI ACCESS DENIED.'));
        } else {
            logMsg('?ERROR: WebMIDI not supported.');
        }

        function onMIDISuccess(access) {
            midiAccess = access;
            updatePorts();
            midiAccess.onstatechange = updatePorts;
        }

        function updatePorts() {
            const inSel = document.getElementById('midiInSelect');
            inSel.innerHTML = '<option value="">-- SELECT --</option>';
            for (let input of midiAccess.inputs.values()) {
                inSel.innerHTML += `<option value="${input.id}">${input.name}</option>`;
            }
        }

        document.getElementById('midiInSelect').addEventListener('change', e => {
            if (selectedInput) selectedInput.onmidimessage = null;
            if (e.target.value) {
                selectedInput = midiAccess.inputs.get(e.target.value);
                selectedInput.onmidimessage = handleMIDIMessage;
                logMsg(`> IN: ${selectedInput.name}`);
            }
        });

        function handleMIDIMessage(msg) {
            const [status, note, velocity] = msg.data;
            const cmd = status >> 4;

            if (cmd === 9 && velocity > 0) {
                activeNotes.set(note, velocity);
            } else if (cmd === 8 || (cmd === 9 && velocity === 0)) {
                activeNotes.delete(note);
            }

            handleMidiChange();
        }
    </script>
</body>
</html>
